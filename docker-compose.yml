services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: smartmall-backend
    env_file:
      - backend/.env
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    image: node:22-alpine
    working_dir: /app
    container_name: smartmall-frontend
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy

