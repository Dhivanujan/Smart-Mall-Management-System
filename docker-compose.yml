services:
  mongodb:
    image: mongo:7
    container_name: smartmall-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: smartmall-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: smartmall-backend
    env_file:
      - backend/.env
    environment:
      - PYTHONUNBUFFERED=1
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DB_NAME=smart_mall
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app:ro
    depends_on:
      - mongodb
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  celery_worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: smartmall-celery
    env_file:
      - backend/.env
    environment:
      - PYTHONUNBUFFERED=1
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DB_NAME=smart_mall
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    command: celery -A app.core.celery_app worker --loglevel=info
    volumes:
      - ./backend/app:/app/app:ro
    depends_on:
      - mongodb
      - redis
      - backend

  frontend:
    image: node:22-alpine
    working_dir: /app
    container_name: smartmall-frontend
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mongo_data:
  redis_data:

